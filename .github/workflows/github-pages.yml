name: GH Pages Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - README.md
  pull_request:
    branches: [main]
    paths-ignore:
      - README.md

permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  id-token: write



jobs:
  github-pages:
    name: Build and deploy

    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Set up Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3"
          bundler-cache: true

      - name: Build 🏗
        run: bundle exec jekyll build --trace

      - name: Deploy to GH Pages 🚀
        if: ${{ github.event_name != 'pull_request' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
